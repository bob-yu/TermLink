<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- 方案1: 综合版优化 - 串口 + 网络 + 终端 -->
  <defs>
    <linearGradient id="bgGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="termGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0c1929"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow1">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect x="0" y="0" width="128" height="128" rx="20" fill="url(#bgGrad1)"/>
  
  <!-- 装饰性网格线 -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="32" x2="128" y2="32"/>
    <line x1="0" y1="64" x2="128" y2="64"/>
    <line x1="0" y1="96" x2="128" y2="96"/>
    <line x1="32" y1="0" x2="32" y2="128"/>
    <line x1="64" y1="0" x2="64" y2="128"/>
    <line x1="96" y1="0" x2="96" y2="128"/>
  </g>
  
  <!-- 终端窗口 (中心) -->
  <g filter="url(#shadow1)">
    <rect x="24" y="28" width="80" height="56" rx="8" fill="url(#termGrad1)" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  
  <!-- 终端标题栏 -->
  <rect x="24" y="28" width="80" height="14" rx="8" fill="#1e40af"/>
  <rect x="24" y="36" width="80" height="6" fill="#1e40af"/>
  <circle cx="34" cy="35" r="3.5" fill="#ef4444"/>
  <circle cx="44" cy="35" r="3.5" fill="#eab308"/>
  <circle cx="54" cy="35" r="3.5" fill="#22c55e"/>
  
  <!-- 终端内容 -->
  <text x="32" y="54" font-family="Consolas, monospace" font-size="9" fill="#22c55e" filter="url(#glow1)">$</text>
  <rect x="40" y="47" width="44" height="7" rx="2" fill="#3b82f6" opacity="0.9"/>
  <rect x="32" y="58" width="56" height="5" rx="1" fill="#22c55e" opacity="0.6"/>
  <rect x="32" y="66" width="36" height="5" rx="1" fill="#64748b" opacity="0.5"/>
  <rect x="32" y="74" width="48" height="5" rx="1" fill="#64748b" opacity="0.3"/>
  
  <!-- 光标 -->
  <rect x="90" y="47" width="6" height="9" rx="1" fill="#22c55e" filter="url(#glow1)">
    <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  
  <!-- USB 串口 (左下) -->
  <g transform="translate(8, 88)">
    <rect x="0" y="0" width="32" height="20" rx="4" fill="#334155" stroke="#f97316" stroke-width="1.5"/>
    <rect x="5" y="4" width="8" height="5" rx="1" fill="#f97316"/>
    <rect x="17" y="4" width="8" height="5" rx="1" fill="#f97316"/>
    <rect x="5" y="11" width="8" height="5" rx="1" fill="#f97316"/>
    <rect x="17" y="11" width="8" height="5" rx="1" fill="#f97316"/>
    <text x="16" y="28" font-family="Arial" font-size="7" fill="#94a3b8" text-anchor="middle" font-weight="bold">UART</text>
  </g>
  
  <!-- 连接线: USB -> 终端 -->
  <path d="M40 96 Q48 88, 48 84" stroke="#f97316" stroke-width="2.5" fill="none" stroke-linecap="round">
    <animate attributeName="stroke-dasharray" values="0,100;20,100" dur="2s" repeatCount="indefinite"/>
  </path>
  <circle cx="40" cy="96" r="3" fill="#f97316" filter="url(#glow1)"/>
  
  <!-- 云/网络 (右上) -->
  <g transform="translate(84, 4)" filter="url(#shadow1)">
    <ellipse cx="20" cy="18" rx="16" ry="12" fill="url(#cloudGrad)"/>
    <ellipse cx="10" cy="20" rx="10" ry="8" fill="url(#cloudGrad)"/>
    <ellipse cx="30" cy="20" rx="10" ry="8" fill="url(#cloudGrad)"/>
    <!-- WiFi 信号 -->
    <path d="M20 12 Q20 8, 24 8" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M20 12 Q20 4, 28 4" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="20" cy="14" r="2" fill="#fff"/>
  </g>
  
  <!-- 连接线: 终端 -> 云 -->
  <path d="M96 44 Q104 32, 100 24" stroke="#38bdf8" stroke-width="2.5" fill="none" stroke-linecap="round">
    <animate attributeName="stroke-dasharray" values="0,100;20,100" dur="2s" repeatCount="indefinite"/>
  </path>
  <circle cx="96" cy="44" r="3" fill="#38bdf8" filter="url(#glow1)"/>
  
  <!-- 远程设备 (右下) -->
  <g transform="translate(88, 88)">
    <rect x="0" y="0" width="32" height="22" rx="4" fill="#334155" stroke="#22c55e" stroke-width="1.5"/>
    <rect x="4" y="4" width="24" height="14" rx="2" fill="#0f172a"/>
    <text x="16" y="14" font-family="Consolas, monospace" font-size="10" fill="#22c55e" text-anchor="middle" filter="url(#glow1)">&gt;_</text>
    <text x="16" y="30" font-family="Arial" font-size="6" fill="#94a3b8" text-anchor="middle">Remote</text>
  </g>
  
  <!-- 连接线: 云 -> 远程 -->
  <path d="M108 28 Q116 56, 104 88" stroke="#22c55e" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="4,3"/>
</svg>